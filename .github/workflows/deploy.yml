name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Dodaj permissions za deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    # OVO JE KLJUČNO - dodaj environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Inject API Key
        run: |
          # Kreiraj config.js sa API ključem iz Secrets
          echo "// Automatski generisano - API ključ" > config.js
          echo "const GROQ_API_KEY = '${{ secrets.GROQ_API_KEY }}';" >> config.js
          
          # Proveri da li je fajl kreiran
          cat config.js
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
