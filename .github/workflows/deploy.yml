name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Inject API Key
        run: |
          # Kreiraj config.js sa API ključem iz Secrets
          echo "// Automatski generisano - API ključ" > config.js
          echo "const GROQ_API_KEY = '${{ secrets.GROQ_API_KEY }}';" >> config.js
          
          # Proveri da li je fajl kreiran
          cat config.js
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
