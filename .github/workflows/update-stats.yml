name: Update RL Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # ===== DODAJ OVO - RUST INSTALACIJA =====
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install maturin
        run: pip install maturin
      # ===== KRAJ DODATKA =====
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run auto_sort_replays
        env:
          BALLCHASING_TOKEN: ${{ secrets.BALLCHASING_TOKEN }}
          BALLCHASING_ONLINE_GROUP: "online-30wp20uwjv"
          BALLCHASING_OFFLINE_GROUP: "exibition-eyc42k96yc"
        run: |
          python auto_sort_replays.py
      
      - name: Run fetch_stats
        env:
          BALLCHASING_TOKEN: ${{ secrets.BALLCHASING_TOKEN }}
          BALLCHASING_GROUPS: "online-30wp20uwjv,exibition-eyc42k96yc"
          BALLCHASING_ONLINE_GROUP: "online-30wp20uwjv"
          BALLCHASING_OFFLINE_GROUP: "exibition-eyc42k96yc"
          OUTPUT_FILE: "data.json"
          CACHE_FILE: "replay_cache.json"
        run: |
          python fetch_stats.py
      
      - name: Commit and push changes
        run: |
          git config user.name "rl-stats-bot"
          git config user.email "rl-stats-bot@users.noreply.github.com"
          
          git pull origin main --rebase || true
          
          git add data.json replay_cache.json subtr_cache.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update stats [skip ci]"
            git push origin main
          fi
